<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Park</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      overflow: hidden;
    }

    #vn-stage {
      position: relative;
      width: 100%;
      height: calc(100vh - 56px);
      overflow: hidden;
      background: var(--bg);
    }

    /* ── TELA INICIAL ──────────────────────────────────── */
    #vn-start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: #000;
      cursor: pointer;
      z-index: 10;
    }

    #game-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #fff;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin: 0;
    }

    #start-hint {
      font-family: monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      animation: hint-pulse 2s ease-in-out infinite;
      margin: 0;
    }

    /* ── MAPA ──────────────────────────────────────────── */
    #vn-map {
      position: absolute;
      inset: 0;
      background: #0a1628;
      display: none;
    }

    #wind-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    #player {
      position: absolute;
      width: 28px;
      height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }

    #destination {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #fff;
      transform: translate(-50%, -50%);
    }

    #map-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      animation: hint-pulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    /* ── CENA VN — wrapper fullscreen ─────────────────── */
    #vn-scene {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.6s ease;
      background: #08040f;
    }

    /* Layout interno: coluna (viewport + bottom) */
    #vn-layout {
      display: flex;
      flex-direction: column;
      width: min(96vw, calc((100vh - 56px) * 1.45));
    }

    /* ── MOLDURA EXTERNA ───────────────────────────────── */
    #vn-frame-outer {
      border: 3px solid #2a1a4e;
      box-shadow:
        0 0 0 1px #08040f,
        0 0 0 4px #4a2a8e,
        0 0 0 5px #08040f;
      line-height: 0;
      flex-shrink: 0;
    }

    /* ── VIEWPORT ──────────────────────────────────────── */
    #center-viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #000;
    }

    #vn-background {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Personagem à direita dentro do viewport */
    #vn-character {
      position: absolute;
      bottom: 0;
      right: 0;
      height: 100%;
      pointer-events: none;
    }

    #vn-character img {
      height: 100%;
      width: auto;
      object-fit: contain;
      object-position: bottom right;
      display: block;
    }

    /* ── FAIXA INFERIOR: dialogue ──────────────────────── */
    #vn-bottom {
      border: 3px solid #2a1a4e;
      border-top: none;
      box-shadow:
        0 0 0 1px #08040f,
        4px 4px 0 4px #4a2a8e;
    }

    /* ── CHOICES — sobrepostas ao viewport, lateral esquerda */
    #choice-container {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 10;
      max-width: 240px;
    }

    .choice-btn {
      font-family: monospace;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #e8e4ff;
      background: rgba(8, 3, 20, 0.82);
      border: 1px solid #4a2a8e;
      border-left: 3px solid #7a4fc0;
      padding: 0.6rem 0.9rem;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .choice-btn:hover,
    .choice-btn:focus {
      background: rgba(90, 53, 171, 0.5);
      border-color: #a07de0;
      color: #fff;
      outline: none;
    }

    /* ── DIALOGUE BOX ──────────────────────────────────── */
    #dialogue-box {
      padding: 0.85rem 1.25rem 0.85rem;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      background: #060310;
      min-height: 110px;
    }

    #name-box {
      font-family: monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
      min-height: 1rem;
    }

    #dialogue-text {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      line-height: 1.75;
      color: #e8e4ff;
      min-height: 2.8rem;
    }

    #advance-hint {
      font-family: monospace;
      font-size: 0.55rem;
      color: #5a35ab;
      text-align: right;
      margin-top: 0.3rem;
      opacity: 0;
      animation: hint-pulse 1.6s ease-in-out infinite;
    }

    /* ── TELA FINAL ────────────────────────────────────── */
    #vn-end-screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: var(--bg);
      z-index: 5;
    }

    #vn-end-screen p {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    #vn-end-screen a {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    #vn-end-screen a:hover {
      border-color: var(--accent);
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    /* ── RESPONSIVO ────────────────────────────────────── */
    @media (max-width: 600px) {
      #vn-layout {
        width: 100vw;
      }

      #vn-frame-outer {
        border-left: none;
        border-right: none;
        box-shadow: none;
      }

      #vn-bottom {
        border-left: none;
        border-right: none;
        box-shadow: none;
      }

      #choice-container {
        min-width: 120px;
        max-width: 140px;
        padding: 0.5rem;
      }

      .choice-btn {
        font-size: 0.68rem;
        padding: 0.4rem 0.5rem;
      }

      #dialogue-box {
        padding: 0.65rem 0.85rem;
        min-height: 90px;
      }

      #dialogue-text { font-size: 0.85rem; }
    }

    /* ── TOUCH CONTROLS ───────────────────────────────── */
    #touch-controls {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2rem;
      z-index: 10;
      pointer-events: auto;
    }

    .touch-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      font-size: 1.4rem;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .touch-btn:active {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.6);
    }

    .choice-btn--active {
      background: rgba(90, 53, 171, 0.5);
      border-color: #a07de0;
      color: #fff;
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="site-title">Zfcmaru</a>
      <a href="../vn/">Ocean Park</a>
    </div>
  </nav>

  <div id="vn-stage">

    <!-- Tela inicial -->
    <div id="vn-start-screen">
      <h1 id="game-title">Ocean Park</h1>
      <p id="start-hint">press enter or click to start</p>
    </div>

    <!-- Mapa -->
    <div id="vn-map">
      <canvas id="wind-canvas"></canvas>
      <div id="player"></div>
      <div id="destination"></div>
      <div id="map-hint">← → helm · Q W sail · reach the marker</div>
      <div id="touch-controls">
        <button id="btn-left"  class="touch-btn">◄</button>
        <button id="btn-right" class="touch-btn">►</button>
      </div>
    </div>

    <!-- Cena VN -->
    <div id="vn-scene">

      <div id="vn-layout">

        <!-- Moldura + viewport -->
        <div id="vn-frame-outer">
          <div id="center-viewport">
            <div id="vn-background"></div>
            <div id="vn-character">
              <img id="char-img" src="../art/Girl_neutral.png" alt="">
            </div>
            <div id="choice-container"></div>
          </div>
        </div>

        <!-- Faixa inferior: dialogue -->
        <div id="vn-bottom">

          <div id="dialogue-box">
            <div id="name-box"></div>
            <div id="dialogue-text"></div>
            <div id="advance-hint">&#9660;</div>
          </div>

        </div>

      </div>

    </div>

    <!-- Tela final -->
    <div id="vn-end-screen">
      <p>[ end ]</p>
      <a href="../" target="_top">back to home</a>
    </div>

  </div>

  <script src="story.js"></script>
  <script>
    // ── ESTADO ────────────────────────────────────────────────────────────────
    let gameState      = 'start';
    let currentBeatId  = null;
    let isBlinking     = false;
    let isChoosing      = false;
    let choiceIndex     = 0;
    let currentChoiceId = null;
    let blinkTimer     = null;
    let vnTyping       = false;
    let vnTypeTimer    = null;

    const player = { x: 0, y: 0 };
    const dest   = { x: 0, y: 0 };
    const TRIGGER_DIST = 40;
    const keys = {};

    const wind = {
      angle: 0, targetAngle: 0, strength: 1.2,
      changeTimer: 0, changeInterval: 180
    };
    let boatAngle = 0;
    const ROTATION_SPEED = 0.045;
    const BOAT_SPEED     = 2.2;
    const WIND_DRIFT     = 0.45;
    const PARTICLE_COUNT = 55;
    const particles      = [];

    let sailAngle = 0;
    const SAIL_ROTATION_SPEED = 0.03;
    const SAIL_MAX_ANGLE = Math.PI * 0.75;
    let sailEfficiency = 0;

    // ── ELEMENTOS ─────────────────────────────────────────────────────────────
    const els = {
      startScreen:     document.getElementById('vn-start-screen'),
      map:             document.getElementById('vn-map'),
      playerEl:        document.getElementById('player'),
      destEl:          document.getElementById('destination'),
      scene:           document.getElementById('vn-scene'),
      background:      document.getElementById('vn-background'),
      charImg:         document.getElementById('char-img'),
      nameBox:         document.getElementById('name-box'),
      dialogText:      document.getElementById('dialogue-text'),
      hint:            document.getElementById('advance-hint'),
      dialogueBox:     document.getElementById('dialogue-box'),
      choiceContainer: document.getElementById('choice-container'),
      endScreen:       document.getElementById('vn-end-screen')
    };

    // ── SPRITES ───────────────────────────────────────────────────────────────
    function setSprite(name) {
      els.charImg.src = SPRITES[name];
    }

    // ── BLINK CYCLE ───────────────────────────────────────────────────────────
    // Ciclo: neutral (3–4s) → semi_rest (80ms) → rest (80ms) → semi_rest (60ms) → volta
    function blinkCycle() {
      if (!isBlinking) return;
      setSprite('neutral');
      blinkTimer = setTimeout(() => {
        if (!isBlinking) return;
        setSprite('semi_rest');
        blinkTimer = setTimeout(() => {
          if (!isBlinking) return;
          setSprite('rest');
          blinkTimer = setTimeout(() => {
            if (!isBlinking) return;
            setSprite('semi_rest');
            blinkTimer = setTimeout(() => blinkCycle(), 60);
          }, 80);
        }, 80);
      }, 3200 + Math.random() * 1200);
    }

    function startBlinkCycle() {
      if (isBlinking) return;
      isBlinking = true;
      blinkCycle();
    }

    function stopBlinkCycle() {
      isBlinking = false;
      clearTimeout(blinkTimer);
    }

    // ── MAPA ──────────────────────────────────────────────────────────────────
    function initMap() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      player.x = W * 0.15;
      player.y = H * 0.50;
      dest.x   = W * 0.75;
      dest.y   = H * 0.50;
      applyPlayerPos();
      applyDestPos();
    }

    function applyPlayerPos() {
      els.playerEl.style.left = player.x + 'px';
      els.playerEl.style.top  = player.y + 'px';
    }

    function applyDestPos() {
      els.destEl.style.left = dest.x + 'px';
      els.destEl.style.top  = dest.y + 'px';
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    let rafId = null;

    // ── VENTO ─────────────────────────────────────────────────────────────────
    function updateWind() {
      wind.changeTimer++;
      if (wind.changeTimer >= wind.changeInterval) {
        wind.changeTimer = 0;
        const delta = (Math.random() - 0.5) * (Math.PI * 2 / 3);
        wind.targetAngle = wind.angle + delta;
        wind.changeInterval = 150 + Math.floor(Math.random() * 120);
      }
      wind.angle += (wind.targetAngle - wind.angle) * 0.012;
    }

    function getWindVector() {
      return {
        x: Math.cos(wind.angle) * wind.strength,
        y: Math.sin(wind.angle) * wind.strength
      };
    }

    // ── FÍSICA DE VELA ────────────────────────────────────────────────────────
    function getPointOfSailFactor(boatAngle, windAngle) {
      const windFrom = windAngle + Math.PI;
      let relative = boatAngle - windFrom;
      while (relative >  Math.PI) relative -= Math.PI * 2;
      while (relative < -Math.PI) relative += Math.PI * 2;
      const abs = Math.abs(relative);
      const DEAD_ZONE = Math.PI * 0.22;
      if (abs < DEAD_ZONE) return 0;
      const t = (abs - DEAD_ZONE) / (Math.PI - DEAD_ZONE);
      if (t < 0.5) {
        return 0.7 + (t / 0.5) * 0.3;
      } else {
        return 1.0 - ((t - 0.5) / 0.5) * 0.45;
      }
    }

    function getSailCalibrationFactor(boatAngle, windAngle, sailAngle) {
      const windFrom = windAngle + Math.PI;
      let relative = boatAngle - windFrom;
      while (relative >  Math.PI) relative -= Math.PI * 2;
      while (relative < -Math.PI) relative += Math.PI * 2;
      const abs = Math.abs(relative);
      const t = abs / Math.PI;
      const optimalSail = (Math.PI / 12) + t * (Math.PI * 0.42);
      const diff = Math.abs(Math.abs(sailAngle) - optimalSail);
      const TOLERANCE = Math.PI / 12;
      if (diff < TOLERANCE) return 1.0;
      const penalty = (diff - TOLERANCE) / (Math.PI * 0.5);
      return Math.max(0, 1.0 - penalty);
    }

    // ── PARTÍCULAS ────────────────────────────────────────────────────────────
    function initParticles() {
      particles.length = 0;
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x:       Math.random() * W,
          y:       Math.random() * H,
          size:    1.5 + Math.random() * 2,
          speed:   0.8 + Math.random() * 1.4,
          opacity: 0.2 + Math.random() * 0.5
        });
      }
    }

    function updateParticles() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      const wv = getWindVector();
      for (const p of particles) {
        p.x += wv.x * p.speed;
        p.y += wv.y * p.speed;
        if (p.x < -10)    p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        if (p.y < -10)    p.y = H + 10;
        if (p.y > H + 10) p.y = -10;
      }
    }

    function drawWindParticles(ctx) {
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
        ctx.fill();
      }
    }

    function drawAll() {
      const canvas  = document.getElementById('wind-canvas');
      const ctx     = canvas.getContext('2d');
      const stage   = document.getElementById('vn-stage');
      if (canvas.width !== stage.clientWidth) {
        canvas.width  = stage.clientWidth;
        canvas.height = stage.clientHeight;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawWindParticles(ctx);
      drawSail(ctx);
      drawHUD(ctx, canvas.width, canvas.height);
    }

    function drawSail(ctx) {
      if (gameState !== 'walking') return;
      const ox = player.x;
      const oy = player.y;
      const SAIL_LENGTH = 28;
      const angle = boatAngle + sailAngle;
      const ex = ox + Math.cos(angle) * SAIL_LENGTH;
      const ey = oy + Math.sin(angle) * SAIL_LENGTH;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)';
      ctx.lineWidth   = 2;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }

    function drawHUD(ctx, W, H) {
      if (gameState !== 'walking') return;
      const margin  = 16;
      const size    = 90;
      const cx      = margin + size / 2;
      const roseY   = H - margin - size + 30;
      const hudTop  = H - margin - size;

      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(margin, hudTop, size, size, 4);
      ctx.fill();
      ctx.stroke();

      const R = 22;

      ctx.beginPath();
      ctx.arc(cx, roseY, R, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.lineWidth = 1;
      ctx.stroke();

      drawArrow(ctx, cx, roseY, wind.angle + Math.PI, R, 'rgba(255,255,255,0.9)', 1.8);
      drawArrow(ctx, cx, roseY, boatAngle, R * 0.75, 'rgba(255,255,255,0.5)', 1.2);

      {
        const sailWorldAngle = boatAngle + sailAngle;
        const len = R * 0.6;
        const sx1 = cx + Math.cos(sailWorldAngle) * len;
        const sy1 = roseY + Math.sin(sailWorldAngle) * len;
        const sx2 = cx - Math.cos(sailWorldAngle) * len;
        const sy2 = roseY - Math.sin(sailWorldAngle) * len;
        ctx.beginPath();
        ctx.moveTo(sx1, sy1);
        ctx.lineTo(sx2, sy2);
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      ctx.font = '8px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'center';
      ctx.fillText('WIND · SAIL · HELM', cx, hudTop + size - 22);

      const barY    = H - margin - 10;
      const barW    = size - 16;
      const barLeft = margin + 8;
      const segW    = (barW - 4) / 5;
      const segH    = 4;

      for (let i = 0; i < 5; i++) {
        const filled = sailEfficiency >= (i + 1) / 5;
        ctx.fillStyle = filled
          ? 'rgba(255,255,255,0.8)'
          : 'rgba(255,255,255,0.12)';
        ctx.fillRect(
          barLeft + i * (segW + 1),
          barY - segH,
          segW,
          segH
        );
      }
    }

    function drawArrow(ctx, cx, cy, angle, length, color, width) {
      const ex = cx + Math.cos(angle) * length;
      const ey = cy + Math.sin(angle) * length;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = color;
      ctx.lineWidth   = width;
      ctx.lineCap     = 'round';
      ctx.stroke();
      const headLen = 5;
      const headAngle = Math.PI / 6;
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(
        ex - headLen * Math.cos(angle - headAngle),
        ey - headLen * Math.sin(angle - headAngle)
      );
      ctx.moveTo(ex, ey);
      ctx.lineTo(
        ex - headLen * Math.cos(angle + headAngle),
        ey - headLen * Math.sin(angle + headAngle)
      );
      ctx.stroke();
    }

    // ── MOVIMENTO DO BARCO ────────────────────────────────────────────────────
    function updatePlayer() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      const wv = getWindVector();

      if (keys['ArrowLeft']  || keys['KeyA']) boatAngle -= ROTATION_SPEED;
      if (keys['ArrowRight'] || keys['KeyD']) boatAngle += ROTATION_SPEED;

      if (keys['KeyQ']) sailAngle = Math.max(-SAIL_MAX_ANGLE, sailAngle - SAIL_ROTATION_SPEED);
      if (keys['KeyW']) sailAngle = Math.min( SAIL_MAX_ANGLE, sailAngle + SAIL_ROTATION_SPEED);

      const pointFactor = getPointOfSailFactor(boatAngle, wind.angle);
      const sailFactor  = getSailCalibrationFactor(boatAngle, wind.angle, sailAngle);
      sailEfficiency = pointFactor * sailFactor;

      const BOAT_SPEED_MAX = 2.8;
      const speed = BOAT_SPEED_MAX * sailEfficiency;

      const DRIFT = 0.15;
      player.x += Math.cos(boatAngle) * speed + wv.x * DRIFT;
      player.y += Math.sin(boatAngle) * speed + wv.y * DRIFT;

      player.x = Math.max(0, Math.min(W, player.x));
      player.y = Math.max(0, Math.min(H, player.y));

      const degrees = boatAngle * (180 / Math.PI);
      els.playerEl.style.left      = player.x + 'px';
      els.playerEl.style.top       = player.y + 'px';
      els.playerEl.style.transform = `translate(-50%, -50%) rotate(${degrees + 90}deg)`;
    }

    function gameLoop() {
      if (gameState !== 'walking') return;
      updateWind();
      updateParticles();
      updatePlayer();
      drawAll();
      if (dist(player, dest) <= TRIGGER_DIST) {
        startDialogue();
        return;
      }
      rafId = requestAnimationFrame(gameLoop);
    }

    // ── TRANSIÇÕES DE ESTADO ──────────────────────────────────────────────────
    function startGame() {
      els.startScreen.style.display = 'none';
      els.map.style.display = 'block';
      initMap();
      initParticles();
      boatAngle = Math.atan2(dest.y - player.y, dest.x - player.x);
      gameState = 'walking';
      rafId = requestAnimationFrame(gameLoop);
    }

    function startDialogue() {
      gameState = 'dialogue';
      cancelAnimationFrame(rafId);
      els.map.style.display = 'none';
      els.scene.style.display = 'flex';
      void els.scene.offsetWidth;
      els.scene.style.opacity = '1';
      startBlinkCycle();
      showBeat('s01');
    }

    function endVN() {
      gameState = 'end';
      stopBlinkCycle();
      els.scene.style.display = 'none';
      els.endScreen.style.display = 'flex';
    }

    // ── MOTOR VN ──────────────────────────────────────────────────────────────
    function showBeat(id) {
      if (id === 'END') { endVN(); return; }

      // Nó de choice
      if (CHOICES[id]) {
        showChoice(id);
        return;
      }

      const beat = SCRIPT[id];
      currentBeatId = id;

      // Background
      if (beat.bg) {
        els.background.style.backgroundImage = `url(${beat.bg})`;
      }

      // Sprite e blink (só troca se o nó definir sprite)
      if (beat.sprite) {
        if (beat.sprite === 'angry') {
          stopBlinkCycle();
          setSprite('angry');
        } else {
          if (!isBlinking) startBlinkCycle();
        }
      }

      // Nome e cor via CHARACTERS
      if (beat.speaker && CHARACTERS[beat.speaker]) {
        const char = CHARACTERS[beat.speaker];
        els.nameBox.textContent = char.name;
        els.nameBox.style.color = char.color;
        els.nameBox.style.visibility = 'visible';
      } else if (beat.speaker === "") {
        els.nameBox.textContent = '';
        els.nameBox.style.visibility = 'hidden';
      }

      // Typewriter
      els.hint.style.animationPlayState = 'paused';
      els.hint.style.opacity = '0';
      startTypewriter(beat.text);
    }

    function startTypewriter(text) {
      vnTyping = true;
      els.dialogText.textContent = '';
      let i = 0;
      clearInterval(vnTypeTimer);
      vnTypeTimer = setInterval(() => {
        els.dialogText.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(vnTypeTimer);
          vnTyping = false;
          els.hint.style.animationPlayState = 'running';
          els.hint.style.opacity = '0.25';
        }
      }, 28);
    }

    function advance() {
      if (gameState !== 'dialogue') return;
      if (isChoosing) return;

      if (vnTyping) {
        clearInterval(vnTypeTimer);
        vnTyping = false;
        els.dialogText.textContent = SCRIPT[currentBeatId].text;
        els.hint.style.animationPlayState = 'running';
        els.hint.style.opacity = '0.25';
        return;
      }

      showBeat(SCRIPT[currentBeatId].next);
    }

    // ── CHOICE UI ─────────────────────────────────────────────────────────────
    function showChoice(choiceId) {
      currentChoiceId = choiceId;
      isChoosing = true;
      choiceIndex = 0;
      const choice = CHOICES[choiceId];

      els.choiceContainer.innerHTML = '';
      choice.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;
        btn.dataset.index = i;
        btn.addEventListener('click', () => confirmChoice(choice, i));
        btn.addEventListener('touchstart', e => {
          e.preventDefault();
          confirmChoice(choice, i);
        }, { passive: false });
        els.choiceContainer.appendChild(btn);
      });

      updateChoiceHighlight();
      // Limpa dialogue enquanto escolha está ativa
      els.nameBox.textContent = '';
      els.dialogText.textContent = '';
      els.hint.style.opacity = '0';

      els.choiceContainer.style.display = 'flex';
    }

    function updateChoiceHighlight() {
      const btns = els.choiceContainer.querySelectorAll('.choice-btn');
      btns.forEach((btn, i) => {
        btn.classList.toggle('choice-btn--active', i === choiceIndex);
      });
    }

    function confirmChoice(choice, index) {
      els.choiceContainer.style.display = 'none';
      els.choiceContainer.innerHTML = '';
      isChoosing = false;
      showBeat(choice.options[index].next);
    }

    // ── EVENTOS ───────────────────────────────────────────────────────────────
    els.startScreen.addEventListener('click', startGame);
    els.startScreen.addEventListener('touchstart', function(e) {
      e.preventDefault();
      startGame();
    }, { passive: false });

    els.dialogueBox.addEventListener('click', advance);
    els.dialogueBox.addEventListener('touchstart', function(e) {
      e.preventDefault();
      advance();
    }, { passive: false });

    const btnLeft  = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');

    btnLeft.addEventListener('touchstart',  e => { e.preventDefault(); keys['ArrowLeft']  = true;  }, { passive: false });
    btnLeft.addEventListener('touchend',    e => { e.preventDefault(); keys['ArrowLeft']  = false; }, { passive: false });
    btnRight.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true;  }, { passive: false });
    btnRight.addEventListener('touchend',   e => { e.preventDefault(); keys['ArrowRight'] = false; }, { passive: false });
    btnLeft.addEventListener('mousedown',  () => keys['ArrowLeft']  = true);
    btnLeft.addEventListener('mouseup',    () => keys['ArrowLeft']  = false);
    btnRight.addEventListener('mousedown', () => keys['ArrowRight'] = true);
    btnRight.addEventListener('mouseup',   () => keys['ArrowRight'] = false);

    document.addEventListener('keydown', function(e) {
      keys[e.code] = true;

      if (gameState === 'start') {
        if (['Space', 'Enter'].includes(e.code)) {
          e.preventDefault();
          startGame();
        }
        return;
      }

      if (gameState === 'walking') {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
             'KeyQ','KeyW','KeyA','KeyD'].includes(e.code)) {
          e.preventDefault();
        }
        return;
      }

      if (gameState === 'dialogue' && isChoosing) {
        const choice = CHOICES[currentChoiceId];
        if (e.code === 'ArrowUp') {
          e.preventDefault();
          choiceIndex = (choiceIndex - 1 + choice.options.length) % choice.options.length;
          updateChoiceHighlight();
        }
        if (e.code === 'ArrowDown') {
          e.preventDefault();
          choiceIndex = (choiceIndex + 1) % choice.options.length;
          updateChoiceHighlight();
        }
        if (['Enter', 'Space'].includes(e.code)) {
          e.preventDefault();
          confirmChoice(choice, choiceIndex);
        }
        return;
      }

      if (gameState === 'dialogue') {
        if (['Space', 'Enter', 'ArrowRight'].includes(e.code)) {
          e.preventDefault();
          advance();
        }
      }
    });

    document.addEventListener('keyup', function(e) {
      keys[e.code] = false;
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VN — ZFC Notes</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body {
      overflow: hidden;
    }

    #vn-stage {
      position: relative;
      width: 100%;
      height: calc(100vh - 56px);
      overflow: hidden;
      background: var(--bg);
    }

    /* ── TELA INICIAL ──────────────────────────────────────────── */
    #vn-start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: var(--bg);
      cursor: pointer;
      z-index: 10;
    }

    #vn-start-screen p {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      animation: hint-pulse 2s ease-in-out infinite;
    }

    /* ── MAPA ──────────────────────────────────────────────────── */
    #vn-map {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
    }

    #player {
      position: absolute;
      width: 28px;
      height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }

    #destination {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #fff;
      transform: translate(-50%, -50%);
    }

    #map-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      animation: hint-pulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    /* ── CENA VN — HUD LAYOUT ──────────────────────────────────── */
    #vn-scene {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.6s ease;
      background: #0f0720;
      /* HUD custom properties */
      --hud-bg:      #0f0720;
      --hud-border:  #5a35ab;
      --hud-accent:  #7a4fc0;
      --hud-green:   #39ff14;
      --hud-yellow:  #f5c518;
      --hud-red:     #e63535;
      --hud-mercury: #cc2222;
      --hud-text:    #d0c8ff;
    }

    /* HUD row */
    #hud-row {
      display: flex;
      flex: 1;
      overflow: hidden;
      border-bottom: 2px solid var(--hud-border);
    }

    /* ── PAINEL ESQUERDO ────────────────────────────────────────── */
    #hud-left {
      width: 22%;
      min-width: 130px;
      background: var(--hud-bg);
      border-right: 2px solid var(--hud-border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
    }

    #hud-portrait {
      width: 100%;
      aspect-ratio: 1;
      background: #08031a;
      border: 2px solid var(--hud-border);
      flex-shrink: 0;
    }

    .hud-monitor {
      background: #020e04;
      border: 2px solid var(--hud-border);
      padding: 4px 6px;
      flex-shrink: 0;
    }

    .monitor-label {
      font-family: monospace;
      font-size: 0.6rem;
      color: var(--hud-green);
      margin-bottom: 2px;
    }

    .monitor-val { color: #fff; }

    .monitor-wave {
      display: block;
      width: 100%;
      height: 40px;
    }

    .wave-line {
      fill: none;
      stroke: var(--hud-green);
      stroke-width: 1.5;
    }

    #hud-controls {
      display: flex;
      gap: 8px;
      margin-top: auto;
      align-items: flex-end;
    }

    #hud-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hud-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      cursor: default;
      flex-shrink: 0;
    }

    .hud-btn--yellow { background: var(--hud-yellow); }
    .hud-btn--red    { background: var(--hud-red); }

    #hud-bars {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      flex: 1;
    }

    .hud-bar-track {
      flex: 1;
      height: 60px;
      background: #1a0a2e;
      border: 1px solid var(--hud-border);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .hud-bar-fill {
      width: 100%;
      background: linear-gradient(to top, #39ff14, #9fff8a);
    }

    /* ── VIEWPORT CENTRAL ──────────────────────────────────────── */
    #center-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #vn-background {
      position: absolute;
      inset: 0;
      background-color: #000;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    #vn-character {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 95%;
      pointer-events: none;
    }

    #vn-character img {
      height: 100%;
      width: auto;
      object-fit: contain;
      object-position: bottom center;
      display: block;
    }

    /* ── PAINEL DIREITO ─────────────────────────────────────────── */
    #hud-right {
      width: 11%;
      min-width: 64px;
      background: var(--hud-bg);
      border-left: 2px solid var(--hud-border);
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      padding: 12px 4px;
    }

    .hud-thermo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 80%;
    }

    .thermo-label {
      font-family: monospace;
      font-size: 0.65rem;
      color: var(--hud-text);
      flex-shrink: 0;
    }

    .thermo-tube {
      flex: 1;
      width: 12px;
      background: #1a0a2e;
      border: 2px solid var(--hud-border);
      border-radius: 6px 6px 0 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .thermo-mercury {
      width: 100%;
      background: linear-gradient(to top, var(--hud-mercury), #ff6666);
    }

    .thermo-bulb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff6666, var(--hud-mercury));
      border: 2px solid var(--hud-border);
      flex-shrink: 0;
    }

    /* ── CAIXA DE DIÁLOGO ──────────────────────────────────────── */
    #dialogue-box {
      background: rgba(15, 7, 32, 0.95);
      border-top: 2px solid var(--hud-border);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 1rem 2rem 0.75rem;
      min-height: 160px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    #name-box {
      font-family: monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--hud-accent);
      margin-bottom: 0.4rem;
      min-height: 1rem;
    }

    #dialogue-text {
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.8;
      color: #e8e4ff;
      min-height: 3rem;
    }

    #advance-hint {
      font-family: monospace;
      font-size: 0.6rem;
      color: var(--hud-accent);
      text-align: right;
      margin-top: 0.4rem;
      opacity: 0;
      animation: hint-pulse 1.6s ease-in-out infinite;
    }

    /* ── BARRA INFERIOR ─────────────────────────────────────────── */
    #bottom-bar {
      display: flex;
      justify-content: center;
      background: var(--hud-bg);
      border-top: 1px solid var(--hud-border);
      padding: 4px 0;
    }

    .bar-btn {
      font-family: monospace;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: var(--hud-text);
      background: transparent;
      border: none;
      border-right: 1px solid var(--hud-border);
      padding: 4px 16px;
      cursor: default;
    }

    .bar-btn:last-child { border-right: none; }

    /* ── TELA FINAL ────────────────────────────────────────────── */
    #vn-end-screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: var(--bg);
      z-index: 5;
    }

    #vn-end-screen p {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    #vn-end-screen a {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    #vn-end-screen a:hover {
      border-color: var(--accent);
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 1; }
    }

    @media (max-width: 600px) {
      #hud-left  { width: 80px; min-width: 80px; }
      #hud-right { width: 48px; min-width: 48px; }
      #hud-portrait { aspect-ratio: unset; height: 64px; }
      .monitor-wave { height: 28px; }
      #hud-controls { gap: 4px; }
      .hud-btn { width: 24px; height: 24px; }
      .hud-bar-track { height: 40px; }
      #vn-character { height: 85%; }
      #dialogue-box { padding: 0.75rem 1rem; min-height: 130px; }
      #dialogue-text { font-size: 0.9rem; }
      .thermo-tube { width: 8px; }
      .thermo-bulb { width: 16px; height: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="site-title">ZFC Notes</a>
      <a href="../blog/">Blog</a>
      <a href="../art/">Art</a>
      <a href="../vn/">VN</a>
    </div>
  </nav>

  <div id="vn-stage">

    <!-- Tela inicial -->
    <div id="vn-start-screen">
      <p>click to start</p>
    </div>

    <!-- Mapa -->
    <div id="vn-map">
      <div id="player"></div>
      <div id="destination"></div>
      <div id="map-hint">use arrow keys to move</div>
    </div>

    <!-- Cena VN -->
    <div id="vn-scene">

      <!-- ── HUD ROW ─────────────────────────────────────────────── -->
      <div id="hud-row">

        <!-- PAINEL ESQUERDO -->
        <div id="hud-left">

          <div id="hud-portrait"><!-- placeholder --></div>

          <div class="hud-monitor">
            <div class="monitor-label">SYS <span class="monitor-val">856 BPM</span></div>
            <svg class="monitor-wave" viewBox="0 0 120 30" preserveAspectRatio="none">
              <polyline class="wave-line"
                points="0,15 10,15 14,4 18,26 22,4 26,26 30,15 40,15 44,4 48,26 52,4 56,26 60,15 80,15 84,8 88,22 92,8 96,22 100,15 120,15"/>
            </svg>
          </div>

          <div class="hud-monitor">
            <div class="monitor-label">BIO <span class="monitor-val">856 BPM</span></div>
            <svg class="monitor-wave" viewBox="0 0 120 30" preserveAspectRatio="none">
              <polyline class="wave-line"
                points="0,15 8,15 12,6 16,24 20,10 24,20 28,15 50,15 54,5 58,25 62,5 66,25 70,15 90,15 94,9 98,21 102,9 106,21 110,15 120,15"/>
            </svg>
          </div>

          <div id="hud-controls">
            <div id="hud-buttons">
              <div class="hud-btn hud-btn--yellow"></div>
              <div class="hud-btn hud-btn--red"></div>
            </div>
            <div id="hud-bars">
              <div class="hud-bar-track"><div class="hud-bar-fill" style="height:72%"></div></div>
              <div class="hud-bar-track"><div class="hud-bar-fill" style="height:45%"></div></div>
              <div class="hud-bar-track"><div class="hud-bar-fill" style="height:88%"></div></div>
            </div>
          </div>

        </div><!-- /#hud-left -->

        <!-- VIEWPORT CENTRAL -->
        <div id="center-viewport">
          <div id="vn-background"></div>
          <div id="vn-character">
            <img id="char-img" src="../art/Girl_1_sprite_1.png" alt="Character">
          </div>
        </div>

        <!-- PAINEL DIREITO -->
        <div id="hud-right">
          <div class="hud-thermo">
            <div class="thermo-label">°F</div>
            <div class="thermo-tube"><div class="thermo-mercury" style="height:40%"></div></div>
            <div class="thermo-bulb"></div>
          </div>
          <div class="hud-thermo">
            <div class="thermo-label">°C</div>
            <div class="thermo-tube"><div class="thermo-mercury" style="height:40%"></div></div>
            <div class="thermo-bulb"></div>
          </div>
        </div>

      </div><!-- /#hud-row -->

      <!-- CAIXA DE DIÁLOGO -->
      <div id="dialogue-box">
        <div id="name-box"></div>
        <div id="dialogue-text"></div>
        <div id="advance-hint">&#9660;</div>
      </div>

      <!-- BARRA INFERIOR -->
      <div id="bottom-bar">
        <button class="bar-btn">History</button>
        <button class="bar-btn">Skip</button>
        <button class="bar-btn">Auto</button>
        <button class="bar-btn">Save</button>
        <button class="bar-btn">Prefs</button>
      </div>

    </div>

    <!-- Tela final -->
    <div id="vn-end-screen">
      <p>[ end ]</p>
      <a href="../" target="_top">back to home</a>
    </div>

  </div>

  <script>
    // ── SCRIPT DA HISTÓRIA ─────────────────────────────────────────────────────
    const SCRIPT = [
      {
        speaker: "",
        text: "...",
        bg: "../art/IMG_8371.jpeg"
      },
      {
        speaker: "???",
        text: "You made it here."
      },
      {
        speaker: "???",
        text: "I'm not sure what I expected to find."
      },
      {
        speaker: "???",
        text: "But I'm glad you came."
      }
    ];

    // ── ESTADO ────────────────────────────────────────────────────────────────
    // gameState: 'start' | 'walking' | 'dialogue' | 'end'
    let gameState = 'start';

    // Posição do jogador (px, centro do elemento)
    const player = { x: 0, y: 0 };
    // Posição do destino (px, centro do elemento)
    const dest = { x: 0, y: 0 };

    const SPEED = 3;
    const TRIGGER_DIST = 40;

    const keys = {};

    // Rotação do ponteiro por direção
    const DIR_ROTATION = {
      up:    'translate(-50%, -50%) rotate(0deg)',
      down:  'translate(-50%, -50%) rotate(180deg)',
      left:  'translate(-50%, -50%) rotate(-90deg)',
      right: 'translate(-50%, -50%) rotate(90deg)'
    };
    let lastDir = 'up';

    // ── ELEMENTOS ─────────────────────────────────────────────────────────────
    const els = {
      startScreen: document.getElementById('vn-start-screen'),
      map:         document.getElementById('vn-map'),
      playerEl:    document.getElementById('player'),
      destEl:      document.getElementById('destination'),
      scene:       document.getElementById('vn-scene'),
      background:  document.getElementById('vn-background'),
      character:   document.getElementById('vn-character'),
      charImg:     document.getElementById('char-img'),
      nameBox:     document.getElementById('name-box'),
      dialogText:  document.getElementById('dialogue-text'),
      hint:        document.getElementById('advance-hint'),
      dialogueBox: document.getElementById('dialogue-box'),
      endScreen:   document.getElementById('vn-end-screen')
    };

    // ── MAPA ──────────────────────────────────────────────────────────────────
    function initMap() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;

      player.x = W * 0.15;
      player.y = H * 0.50;

      dest.x = W * 0.75;
      dest.y = H * 0.50;

      applyPlayerPos();
      applyDestPos();
    }

    function applyPlayerPos() {
      els.playerEl.style.left = player.x + 'px';
      els.playerEl.style.top  = player.y + 'px';
    }

    function applyDestPos() {
      els.destEl.style.left = dest.x + 'px';
      els.destEl.style.top  = dest.y + 'px';
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    let rafId = null;

    function gameLoop() {
      if (gameState !== 'walking') return;

      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;

      let dx = 0, dy = 0;
      if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
      if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
      if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
      if (keys['ArrowRight'] || keys['KeyD']) dx += 1;

      if (dx !== 0 || dy !== 0) {
        // Normaliza diagonal
        if (dx !== 0 && dy !== 0) {
          dx *= 0.707;
          dy *= 0.707;
        }

        player.x = Math.max(0, Math.min(W, player.x + dx * SPEED));
        player.y = Math.max(0, Math.min(H, player.y + dy * SPEED));
        applyPlayerPos();

        // Atualiza rotação
        if      (dy < 0) lastDir = 'up';
        else if (dy > 0) lastDir = 'down';
        else if (dx < 0) lastDir = 'left';
        else if (dx > 0) lastDir = 'right';
        els.playerEl.style.transform = DIR_ROTATION[lastDir];
      }

      // Checa chegada
      if (dist(player, dest) <= TRIGGER_DIST) {
        startDialogue();
        return;
      }

      rafId = requestAnimationFrame(gameLoop);
    }

    // ── TRANSIÇÕES DE ESTADO ──────────────────────────────────────────────────
    function startGame() {
      els.startScreen.style.display = 'none';
      els.map.style.display = 'block';
      initMap();
      gameState = 'walking';
      rafId = requestAnimationFrame(gameLoop);
    }

    function startDialogue() {
      gameState = 'dialogue';
      cancelAnimationFrame(rafId);

      // Esconde mapa, mostra cena
      els.map.style.display = 'none';
      els.scene.style.display = 'flex';
      // Força reflow para a transição funcionar
      void els.scene.offsetWidth;
      els.scene.style.opacity = '1';

      vnIndex = 0;
      showBeat(0);
    }

    function endVN() {
      gameState = 'end';
      els.scene.style.display = 'none';
      els.endScreen.style.display = 'flex';
    }

    // ── MOTOR VN ──────────────────────────────────────────────────────────────
    let vnIndex = 0;
    let vnTyping = false;
    let vnTypeTimer = null;

    function showBeat(index) {
      if (index >= SCRIPT.length) {
        endVN();
        return;
      }

      const beat = SCRIPT[index];

      // Fundo
      if (beat.bg) {
        const url = beat.bg.startsWith('url(') ? beat.bg : `url(${beat.bg})`;
        els.background.style.backgroundImage = url;
      }

      // Nome
      if (beat.speaker) {
        els.nameBox.textContent = beat.speaker;
        els.nameBox.style.visibility = 'visible';
      } else {
        els.nameBox.textContent = '';
        els.nameBox.style.visibility = 'hidden';
      }

      // Typewriter
      els.hint.style.animationPlayState = 'paused';
      els.hint.style.opacity = '0';
      startTypewriter(beat.text);
    }

    function startTypewriter(text) {
      vnTyping = true;
      els.dialogText.textContent = '';
      let i = 0;
      clearInterval(vnTypeTimer);
      vnTypeTimer = setInterval(function () {
        els.dialogText.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(vnTypeTimer);
          vnTyping = false;
          els.hint.style.animationPlayState = 'running';
          els.hint.style.opacity = '0.25';
        }
      }, 28);
    }

    function advance() {
      if (gameState !== 'dialogue') return;
      if (vnTyping) {
        clearInterval(vnTypeTimer);
        vnTyping = false;
        els.dialogText.textContent = SCRIPT[vnIndex].text;
        els.hint.style.animationPlayState = 'running';
        els.hint.style.opacity = '0.25';
        return;
      }
      vnIndex++;
      showBeat(vnIndex);
    }

    // ── EVENTOS ───────────────────────────────────────────────────────────────
    els.startScreen.addEventListener('click', startGame);

    els.dialogueBox.addEventListener('click', advance);

    document.addEventListener('keydown', function (e) {
      keys[e.code] = true;

      if (gameState === 'start') {
        if (['Space', 'Enter'].includes(e.code)) {
          e.preventDefault();
          startGame();
        }
        return;
      }

      if (gameState === 'walking') {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
          e.preventDefault();
        }
        return;
      }

      if (gameState === 'dialogue') {
        if (['Space', 'Enter', 'ArrowRight'].includes(e.code)) {
          e.preventDefault();
          advance();
        }
      }
    });

    document.addEventListener('keyup', function (e) {
      keys[e.code] = false;
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VN — ZFC Notes</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body {
      overflow: hidden;
    }

    #vn-stage {
      position: relative;
      width: 100%;
      height: calc(100vh - 56px);
      overflow: hidden;
      background: var(--bg);
    }

    /* ── TELA INICIAL ──────────────────────────────────── */
    #vn-start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: var(--bg);
      cursor: pointer;
      z-index: 10;
    }

    #vn-start-screen p {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      animation: hint-pulse 2s ease-in-out infinite;
    }

    /* ── MAPA ──────────────────────────────────────────── */
    #vn-map {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
    }

    #player {
      position: absolute;
      width: 28px;
      height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }

    #destination {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #fff;
      transform: translate(-50%, -50%);
    }

    #map-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      animation: hint-pulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    /* ── CENA VN ───────────────────────────────────────── */
    #vn-scene {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #center-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Frame decorativo — borda dupla fina */
    #vn-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      box-shadow:
        inset 0 0 0 4px #0d0920,
        inset 0 0 0 7px #3a2a5e,
        inset 0 0 0 10px #0d0920;
    }

    #vn-background {
      position: absolute;
      inset: 0;
      background-color: #000;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    /* Personagem à direita */
    #vn-character {
      position: absolute;
      bottom: 0;
      right: 0;
      height: 95%;
      pointer-events: none;
    }

    #vn-character img {
      height: 100%;
      width: auto;
      object-fit: contain;
      object-position: bottom right;
      display: block;
    }

    /* ── CHOICE UI — canto inferior direito ────────────── */
    #choice-container {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      display: none;
      flex-direction: column;
      gap: 0.4rem;
      z-index: 10;
      max-width: 280px;
    }

    .choice-btn {
      font-family: monospace;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: #e8e4ff;
      background: rgba(10, 5, 25, 0.88);
      border: 1px solid #5a35ab;
      border-left: 3px solid #7a4fc0;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      text-align: left;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s;
    }

    .choice-btn:hover,
    .choice-btn:focus {
      background: rgba(90, 53, 171, 0.35);
      border-color: #a07de0;
      outline: none;
    }

    /* ── CAIXA DE DIÁLOGO ──────────────────────────────── */
    #dialogue-box {
      background: rgba(8, 4, 20, 0.92);
      border-top: 2px solid #3a2a5e;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 1rem 2rem 0.75rem;
      min-height: 140px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    #name-box {
      font-family: monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a4fc0;
      margin-bottom: 0.4rem;
      min-height: 1rem;
    }

    #dialogue-text {
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.8;
      color: #e8e4ff;
      min-height: 3rem;
    }

    #advance-hint {
      font-family: monospace;
      font-size: 0.6rem;
      color: #7a4fc0;
      text-align: right;
      margin-top: 0.4rem;
      opacity: 0;
      animation: hint-pulse 1.6s ease-in-out infinite;
    }

    /* ── TELA FINAL ────────────────────────────────────── */
    #vn-end-screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: var(--bg);
      z-index: 5;
    }

    #vn-end-screen p {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    #vn-end-screen a {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    #vn-end-screen a:hover {
      border-color: var(--accent);
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 1; }
    }

    @media (max-width: 600px) {
      #vn-character { height: 85%; }
      #dialogue-box { padding: 0.75rem 1rem; min-height: 110px; }
      #dialogue-text { font-size: 0.9rem; }
      #choice-container { max-width: 200px; right: 0.75rem; bottom: 0.75rem; }
      .choice-btn { font-size: 0.72rem; padding: 0.45rem 0.7rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="site-title">Zfcmaru</a>
      <a href="../vn/">VN</a>
    </div>
  </nav>

  <div id="vn-stage">

    <!-- Tela inicial -->
    <div id="vn-start-screen">
      <p>click to start</p>
    </div>

    <!-- Mapa -->
    <div id="vn-map">
      <div id="player"></div>
      <div id="destination"></div>
      <div id="map-hint">use arrow keys to move</div>
    </div>

    <!-- Cena VN -->
    <div id="vn-scene">

      <div id="center-viewport">
        <div id="vn-frame"></div>
        <div id="vn-background"></div>
        <div id="vn-character">
          <img id="char-img" src="../art/Girl_neutral.png" alt="">
        </div>
        <div id="choice-container"></div>
      </div>

      <div id="dialogue-box">
        <div id="name-box"></div>
        <div id="dialogue-text"></div>
        <div id="advance-hint">&#9660;</div>
      </div>

    </div>

    <!-- Tela final -->
    <div id="vn-end-screen">
      <p>[ end ]</p>
      <a href="../" target="_top">back to home</a>
    </div>

  </div>

  <script src="story.js"></script>
  <script>
    // ── ESTADO ────────────────────────────────────────────────────────────────
    let gameState      = 'start';
    let currentBeatId  = null;
    let isBlinking     = false;
    let isChoosing     = false;
    let blinkTimer     = null;
    let vnTyping       = false;
    let vnTypeTimer    = null;

    const player = { x: 0, y: 0 };
    const dest   = { x: 0, y: 0 };
    const SPEED        = 3;
    const TRIGGER_DIST = 40;
    const keys = {};

    const DIR_ROTATION = {
      up:    'translate(-50%, -50%) rotate(0deg)',
      down:  'translate(-50%, -50%) rotate(180deg)',
      left:  'translate(-50%, -50%) rotate(-90deg)',
      right: 'translate(-50%, -50%) rotate(90deg)'
    };
    let lastDir = 'up';

    // ── ELEMENTOS ─────────────────────────────────────────────────────────────
    const els = {
      startScreen:     document.getElementById('vn-start-screen'),
      map:             document.getElementById('vn-map'),
      playerEl:        document.getElementById('player'),
      destEl:          document.getElementById('destination'),
      scene:           document.getElementById('vn-scene'),
      background:      document.getElementById('vn-background'),
      charImg:         document.getElementById('char-img'),
      nameBox:         document.getElementById('name-box'),
      dialogText:      document.getElementById('dialogue-text'),
      hint:            document.getElementById('advance-hint'),
      dialogueBox:     document.getElementById('dialogue-box'),
      choiceContainer: document.getElementById('choice-container'),
      endScreen:       document.getElementById('vn-end-screen')
    };

    // ── SPRITES ───────────────────────────────────────────────────────────────
    function setSprite(name) {
      els.charImg.src = SPRITES[name];
    }

    // ── BLINK CYCLE ───────────────────────────────────────────────────────────
    // Ciclo: neutral (3–4s) → semi_rest (80ms) → rest (80ms) → semi_rest (60ms) → volta
    function blinkCycle() {
      if (!isBlinking) return;
      setSprite('neutral');
      blinkTimer = setTimeout(() => {
        if (!isBlinking) return;
        setSprite('semi_rest');
        blinkTimer = setTimeout(() => {
          if (!isBlinking) return;
          setSprite('rest');
          blinkTimer = setTimeout(() => {
            if (!isBlinking) return;
            setSprite('semi_rest');
            blinkTimer = setTimeout(() => blinkCycle(), 60);
          }, 80);
        }, 80);
      }, 3200 + Math.random() * 1200);
    }

    function startBlinkCycle() {
      if (isBlinking) return;
      isBlinking = true;
      blinkCycle();
    }

    function stopBlinkCycle() {
      isBlinking = false;
      clearTimeout(blinkTimer);
    }

    // ── MAPA ──────────────────────────────────────────────────────────────────
    function initMap() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      player.x = W * 0.15;
      player.y = H * 0.50;
      dest.x   = W * 0.75;
      dest.y   = H * 0.50;
      applyPlayerPos();
      applyDestPos();
    }

    function applyPlayerPos() {
      els.playerEl.style.left = player.x + 'px';
      els.playerEl.style.top  = player.y + 'px';
    }

    function applyDestPos() {
      els.destEl.style.left = dest.x + 'px';
      els.destEl.style.top  = dest.y + 'px';
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    let rafId = null;

    function gameLoop() {
      if (gameState !== 'walking') return;
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;

      let dx = 0, dy = 0;
      if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
      if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
      if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
      if (keys['ArrowRight'] || keys['KeyD']) dx += 1;

      if (dx !== 0 || dy !== 0) {
        if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
        player.x = Math.max(0, Math.min(W, player.x + dx * SPEED));
        player.y = Math.max(0, Math.min(H, player.y + dy * SPEED));
        applyPlayerPos();

        if      (dy < 0) lastDir = 'up';
        else if (dy > 0) lastDir = 'down';
        else if (dx < 0) lastDir = 'left';
        else if (dx > 0) lastDir = 'right';
        els.playerEl.style.transform = DIR_ROTATION[lastDir];
      }

      if (dist(player, dest) <= TRIGGER_DIST) {
        startDialogue();
        return;
      }
      rafId = requestAnimationFrame(gameLoop);
    }

    // ── TRANSIÇÕES DE ESTADO ──────────────────────────────────────────────────
    function startGame() {
      els.startScreen.style.display = 'none';
      els.map.style.display = 'block';
      initMap();
      gameState = 'walking';
      rafId = requestAnimationFrame(gameLoop);
    }

    function startDialogue() {
      gameState = 'dialogue';
      cancelAnimationFrame(rafId);
      els.map.style.display = 'none';
      els.scene.style.display = 'flex';
      void els.scene.offsetWidth;
      els.scene.style.opacity = '1';
      startBlinkCycle();
      showBeat('s01');
    }

    function endVN() {
      gameState = 'end';
      stopBlinkCycle();
      els.scene.style.display = 'none';
      els.endScreen.style.display = 'flex';
    }

    // ── MOTOR VN ──────────────────────────────────────────────────────────────
    function showBeat(id) {
      if (id === 'END') { endVN(); return; }

      // Nó de choice
      if (CHOICES[id]) {
        showChoice(id);
        return;
      }

      const beat = SCRIPT[id];
      currentBeatId = id;

      // Background
      if (beat.bg) {
        els.background.style.backgroundImage = `url(${beat.bg})`;
      }

      // Sprite e blink (só troca se o nó definir sprite)
      if (beat.sprite) {
        if (beat.sprite === 'angry') {
          stopBlinkCycle();
          setSprite('angry');
        } else {
          if (!isBlinking) startBlinkCycle();
        }
      }

      // Nome e cor via CHARACTERS
      if (beat.speaker && CHARACTERS[beat.speaker]) {
        const char = CHARACTERS[beat.speaker];
        els.nameBox.textContent = char.name;
        els.nameBox.style.color = char.color;
        els.nameBox.style.visibility = 'visible';
      } else if (beat.speaker === "") {
        els.nameBox.textContent = '';
        els.nameBox.style.visibility = 'hidden';
      }

      // Typewriter
      els.hint.style.animationPlayState = 'paused';
      els.hint.style.opacity = '0';
      startTypewriter(beat.text);
    }

    function startTypewriter(text) {
      vnTyping = true;
      els.dialogText.textContent = '';
      let i = 0;
      clearInterval(vnTypeTimer);
      vnTypeTimer = setInterval(() => {
        els.dialogText.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(vnTypeTimer);
          vnTyping = false;
          els.hint.style.animationPlayState = 'running';
          els.hint.style.opacity = '0.25';
        }
      }, 28);
    }

    function advance() {
      if (gameState !== 'dialogue') return;
      if (isChoosing) return;

      if (vnTyping) {
        clearInterval(vnTypeTimer);
        vnTyping = false;
        els.dialogText.textContent = SCRIPT[currentBeatId].text;
        els.hint.style.animationPlayState = 'running';
        els.hint.style.opacity = '0.25';
        return;
      }

      showBeat(SCRIPT[currentBeatId].next);
    }

    // ── CHOICE UI ─────────────────────────────────────────────────────────────
    function showChoice(choiceId) {
      isChoosing = true;
      const choice = CHOICES[choiceId];

      // Esconde dialogue box
      els.dialogueBox.style.display = 'none';

      // Monta botões
      els.choiceContainer.innerHTML = '';
      choice.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;
        btn.addEventListener('click', () => {
          els.choiceContainer.style.display = 'none';
          els.choiceContainer.innerHTML = '';
          els.dialogueBox.style.display = '';
          isChoosing = false;
          showBeat(opt.next);
        });
        els.choiceContainer.appendChild(btn);
      });

      els.choiceContainer.style.display = 'flex';
    }

    // ── EVENTOS ───────────────────────────────────────────────────────────────
    els.startScreen.addEventListener('click', startGame);
    els.dialogueBox.addEventListener('click', advance);

    document.addEventListener('keydown', function(e) {
      keys[e.code] = true;

      if (gameState === 'start') {
        if (['Space', 'Enter'].includes(e.code)) {
          e.preventDefault();
          startGame();
        }
        return;
      }

      if (gameState === 'walking') {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
          e.preventDefault();
        }
        return;
      }

      if (gameState === 'dialogue') {
        if (['Space', 'Enter', 'ArrowRight'].includes(e.code)) {
          e.preventDefault();
          advance();
        }
      }
    });

    document.addEventListener('keyup', function(e) {
      keys[e.code] = false;
    });
  </script>

</body>
</html>

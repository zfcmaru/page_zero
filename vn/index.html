<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VN — ZFC Notes</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body {
      overflow: hidden;
    }

    #vn-stage {
      position: relative;
      width: 100%;
      height: calc(100vh - 56px);
      overflow: hidden;
      background: var(--bg);
    }

    /* ── TELA INICIAL ──────────────────────────────────────────── */
    #vn-start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: var(--bg);
      cursor: pointer;
      z-index: 10;
    }

    #vn-start-screen p {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      animation: hint-pulse 2s ease-in-out infinite;
    }

    /* ── MAPA ──────────────────────────────────────────────────── */
    #vn-map {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
    }

    #player {
      position: absolute;
      width: 28px;
      height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }

    #destination {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #fff;
      transform: translate(-50%, -50%);
    }

    #map-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      animation: hint-pulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    /* ── CENA VN ───────────────────────────────────────────────── */
    #vn-scene {
      position: absolute;
      inset: 0;
      display: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #vn-background {
      position: absolute;
      inset: 0;
      background-color: var(--bg);
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    #vn-character {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 85%;
      pointer-events: none;
    }

    #vn-character img {
      height: 100%;
      width: auto;
      object-fit: contain;
      object-position: bottom center;
      display: block;
    }

    #dialogue-box {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      min-height: 190px;
      background: rgba(13, 13, 13, 0.88);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 1.25rem 2rem 1.25rem;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    #name-box {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
      min-height: 1rem;
    }

    #dialogue-text {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--text);
      min-height: 3.6rem;
    }

    #advance-hint {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: 0.6rem;
      opacity: 0;
      animation: hint-pulse 1.6s ease-in-out infinite;
    }

    /* ── TELA FINAL ────────────────────────────────────────────── */
    #vn-end-screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: var(--bg);
      z-index: 5;
    }

    #vn-end-screen p {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    #vn-end-screen a {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    #vn-end-screen a:hover {
      border-color: var(--accent);
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 1; }
    }

    @media (max-width: 600px) {
      #vn-character { height: 58%; }
      #dialogue-box { padding: 1rem 1.25rem 1rem; min-height: 170px; }
      #dialogue-text { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="site-title">ZFC Notes</a>
      <a href="../blog/">Blog</a>
      <a href="../art/">Arte</a>
      <a href="../vn/">VN</a>
    </div>
  </nav>

  <div id="vn-stage">

    <!-- Tela inicial -->
    <div id="vn-start-screen">
      <p>clique para começar</p>
    </div>

    <!-- Mapa -->
    <div id="vn-map">
      <div id="player"></div>
      <div id="destination"></div>
      <div id="map-hint">use as setas para se mover</div>
    </div>

    <!-- Cena VN -->
    <div id="vn-scene">
      <div id="vn-background"></div>
      <div id="vn-character">
        <img id="char-img" src="../art/Girl_1_sprite_1.png" alt="Personagem">
      </div>
      <div id="dialogue-box">
        <div id="name-box"></div>
        <div id="dialogue-text"></div>
        <div id="advance-hint">&#9660;</div>
      </div>
    </div>

    <!-- Tela final -->
    <div id="vn-end-screen">
      <p>[ fim ]</p>
      <a href="../">voltar ao início</a>
    </div>

  </div>

  <script>
    // ── SCRIPT DA HISTÓRIA ─────────────────────────────────────────────────────
    const SCRIPT = [
      {
        speaker: "",
        text: "...",
        bg: "../art/IMG_8371.jpeg"
      },
      {
        speaker: "???",
        text: "Você chegou até aqui."
      },
      {
        speaker: "???",
        text: "Não sei bem o que esperava encontrar."
      },
      {
        speaker: "???",
        text: "Mas que bom que veio."
      }
    ];

    // ── ESTADO ────────────────────────────────────────────────────────────────
    // gameState: 'start' | 'walking' | 'dialogue' | 'end'
    let gameState = 'start';

    // Posição do jogador (px, centro do elemento)
    const player = { x: 0, y: 0 };
    // Posição do destino (px, centro do elemento)
    const dest = { x: 0, y: 0 };

    const SPEED = 3;
    const TRIGGER_DIST = 40;

    const keys = {};

    // Rotação do ponteiro por direção
    const DIR_ROTATION = {
      up:    'translate(-50%, -50%) rotate(0deg)',
      down:  'translate(-50%, -50%) rotate(180deg)',
      left:  'translate(-50%, -50%) rotate(-90deg)',
      right: 'translate(-50%, -50%) rotate(90deg)'
    };
    let lastDir = 'up';

    // ── ELEMENTOS ─────────────────────────────────────────────────────────────
    const els = {
      startScreen: document.getElementById('vn-start-screen'),
      map:         document.getElementById('vn-map'),
      playerEl:    document.getElementById('player'),
      destEl:      document.getElementById('destination'),
      scene:       document.getElementById('vn-scene'),
      background:  document.getElementById('vn-background'),
      character:   document.getElementById('vn-character'),
      charImg:     document.getElementById('char-img'),
      nameBox:     document.getElementById('name-box'),
      dialogText:  document.getElementById('dialogue-text'),
      hint:        document.getElementById('advance-hint'),
      dialogueBox: document.getElementById('dialogue-box'),
      endScreen:   document.getElementById('vn-end-screen')
    };

    // ── MAPA ──────────────────────────────────────────────────────────────────
    function initMap() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;

      player.x = W * 0.15;
      player.y = H * 0.50;

      dest.x = W * 0.75;
      dest.y = H * 0.50;

      applyPlayerPos();
      applyDestPos();
    }

    function applyPlayerPos() {
      els.playerEl.style.left = player.x + 'px';
      els.playerEl.style.top  = player.y + 'px';
    }

    function applyDestPos() {
      els.destEl.style.left = dest.x + 'px';
      els.destEl.style.top  = dest.y + 'px';
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    let rafId = null;

    function gameLoop() {
      if (gameState !== 'walking') return;

      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;

      let dx = 0, dy = 0;
      if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
      if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
      if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
      if (keys['ArrowRight'] || keys['KeyD']) dx += 1;

      if (dx !== 0 || dy !== 0) {
        // Normaliza diagonal
        if (dx !== 0 && dy !== 0) {
          dx *= 0.707;
          dy *= 0.707;
        }

        player.x = Math.max(0, Math.min(W, player.x + dx * SPEED));
        player.y = Math.max(0, Math.min(H, player.y + dy * SPEED));
        applyPlayerPos();

        // Atualiza rotação
        if      (dy < 0) lastDir = 'up';
        else if (dy > 0) lastDir = 'down';
        else if (dx < 0) lastDir = 'left';
        else if (dx > 0) lastDir = 'right';
        els.playerEl.style.transform = DIR_ROTATION[lastDir];
      }

      // Checa chegada
      if (dist(player, dest) <= TRIGGER_DIST) {
        startDialogue();
        return;
      }

      rafId = requestAnimationFrame(gameLoop);
    }

    // ── TRANSIÇÕES DE ESTADO ──────────────────────────────────────────────────
    function startGame() {
      els.startScreen.style.display = 'none';
      els.map.style.display = 'block';
      initMap();
      gameState = 'walking';
      rafId = requestAnimationFrame(gameLoop);
    }

    function startDialogue() {
      gameState = 'dialogue';
      cancelAnimationFrame(rafId);

      // Esconde mapa, mostra cena
      els.map.style.display = 'none';
      els.scene.style.display = 'block';
      // Força reflow para a transição funcionar
      void els.scene.offsetWidth;
      els.scene.style.opacity = '1';

      vnIndex = 0;
      showBeat(0);
    }

    function endVN() {
      gameState = 'end';
      els.scene.style.display = 'none';
      els.endScreen.style.display = 'flex';
    }

    // ── MOTOR VN ──────────────────────────────────────────────────────────────
    let vnIndex = 0;
    let vnTyping = false;
    let vnTypeTimer = null;

    function showBeat(index) {
      if (index >= SCRIPT.length) {
        endVN();
        return;
      }

      const beat = SCRIPT[index];

      // Fundo
      if (beat.bg) {
        const url = beat.bg.startsWith('url(') ? beat.bg : `url(${beat.bg})`;
        els.background.style.backgroundImage = url;
      }

      // Nome
      if (beat.speaker) {
        els.nameBox.textContent = beat.speaker;
        els.nameBox.style.visibility = 'visible';
      } else {
        els.nameBox.textContent = '';
        els.nameBox.style.visibility = 'hidden';
      }

      // Typewriter
      els.hint.style.animationPlayState = 'paused';
      els.hint.style.opacity = '0';
      startTypewriter(beat.text);
    }

    function startTypewriter(text) {
      vnTyping = true;
      els.dialogText.textContent = '';
      let i = 0;
      clearInterval(vnTypeTimer);
      vnTypeTimer = setInterval(function () {
        els.dialogText.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(vnTypeTimer);
          vnTyping = false;
          els.hint.style.animationPlayState = 'running';
          els.hint.style.opacity = '0.25';
        }
      }, 28);
    }

    function advance() {
      if (gameState !== 'dialogue') return;
      if (vnTyping) {
        clearInterval(vnTypeTimer);
        vnTyping = false;
        els.dialogText.textContent = SCRIPT[vnIndex].text;
        els.hint.style.animationPlayState = 'running';
        els.hint.style.opacity = '0.25';
        return;
      }
      vnIndex++;
      showBeat(vnIndex);
    }

    // ── EVENTOS ───────────────────────────────────────────────────────────────
    els.startScreen.addEventListener('click', startGame);

    els.dialogueBox.addEventListener('click', advance);

    document.addEventListener('keydown', function (e) {
      keys[e.code] = true;

      if (gameState === 'start') {
        if (['Space', 'Enter'].includes(e.code)) {
          e.preventDefault();
          startGame();
        }
        return;
      }

      if (gameState === 'walking') {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
          e.preventDefault();
        }
        return;
      }

      if (gameState === 'dialogue') {
        if (['Space', 'Enter', 'ArrowRight'].includes(e.code)) {
          e.preventDefault();
          advance();
        }
      }
    });

    document.addEventListener('keyup', function (e) {
      keys[e.code] = false;
    });
  </script>

</body>
</html>

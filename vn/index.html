<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Park</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════
       OCEAN PARK — PC-98 INTERFACE
       ═══════════════════════════════════════════════════════════ */

    body {
      overflow: hidden;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
      image-rendering: pixelated;
    }

    #vn-stage {
      position: relative;
      width: 100%;
      height: calc(100vh - 56px);
      overflow: hidden;
      background: #000;
    }

    /* ── TELA INICIAL ──────────────────────────────────── */
    #vn-start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: #000;
      cursor: pointer;
      z-index: 10;
    }

    #game-title {
      font-family: 'DotGothic16', monospace;
      font-weight: 400;
      font-size: clamp(2rem, 7vw, 4rem);
      color: #fff;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0;
    }

    #start-hint {
      font-family: 'DotGothic16', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      opacity: 0.5;
      animation: hint-pulse 2s ease-in-out infinite;
      margin: 0;
    }

    /* ── MAPA ──────────────────────────────────────────── */
    #vn-map {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
    }

    #wind-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    #player {
      position: absolute;
      width: 28px;
      height: 28px;
      background: #fff;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }

    #destination {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #f5c542;
      transform: translate(-50%, -50%);
    }

    #map-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DotGothic16', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      opacity: 0.4;
      animation: hint-pulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    /* ── CENA VN — wrapper fullscreen ─────────────────── */
    #vn-scene {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s ease;
      background: #000;
      padding: 1rem;
      box-sizing: border-box;
    }

    /* Layout PC-98: grid de 2 colunas + 1 linha full width */
    #vn-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      grid-template-rows: auto auto;
      gap: 0.75rem;
      width: 100%;
      max-width: min(96vw, calc((100vh - 140px) * 1.6));
      max-height: calc(100vh - 90px);
    }

    /* ── VIEWPORT (arte) — coluna esquerda, linha 1 ─── */
    #vn-frame-outer {
      grid-column: 1;
      grid-row: 1;
      border: 2px solid #fff;
      background: #000;
      line-height: 0;
      position: relative;
    }

    #center-viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #000;
      background-image:
        repeating-linear-gradient(
          45deg,
          #0a0a0a 0,
          #0a0a0a 2px,
          #000 2px,
          #000 4px
        );
    }

    #vn-background {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      image-rendering: pixelated;
    }

    /* Personagem centralizada, cabe inteira no quadro */
    #vn-character {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 100%;
      pointer-events: none;
    }

    #vn-character img {
      height: 100%;
      max-height: 95%;
      width: auto;
      object-fit: contain;
      object-position: bottom center;
      display: block;
      image-rendering: pixelated;
    }

    /* ── NAME BOX — painel próprio, absolute no viewport ── */
    #name-box {
      position: absolute;
      top: -2px;
      left: -2px;
      background: #000;
      border: 2px solid #fff;
      padding: 0.4rem 0.9rem;
      font-family: 'DotGothic16', monospace;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #fff;
      min-width: 120px;
      z-index: 5;
      min-height: 1rem;
    }

    /* ── CHOICES — coluna direita, painel sólido ──────── */
    #choice-container {
      grid-column: 2;
      grid-row: 1;
      display: none;
      flex-direction: column;
      background: #000;
      border: 2px solid #fff;
      padding: 1rem 1.1rem;
      align-self: start;
    }

    #choice-container.is-active {
      display: flex;
    }

    .choice-btn {
      font-family: 'DotGothic16', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      color: #fff;
      background: transparent;
      border: none;
      padding: 0.4rem 0 0.4rem 1.6rem;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      position: relative;
      transition: color 0.1s;
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      color: #f5c542;
      font-size: 0.85rem;
      opacity: 0;
    }

    .choice-btn--active {
      color: #f5c542;
    }

    .choice-btn--active::before {
      content: '▶';
      opacity: 1;
    }

    .choice-btn:hover,
    .choice-btn:focus {
      color: #f5c542;
      outline: none;
    }

    .choice-btn:hover::before,
    .choice-btn:focus::before {
      content: '▶';
      opacity: 1;
    }

    /* ── PLACEHOLDER pra coluna direita quando não há choice ── */
    #choice-placeholder {
      grid-column: 2;
      grid-row: 1;
      background: #000;
      border: 2px solid #fff;
      padding: 1rem;
      align-self: start;
      min-height: 140px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    #choice-container.is-active ~ #choice-placeholder {
      display: none;
    }

    /* ── DIALOGUE BOX — full width, linha 2 ──────────── */
    #vn-bottom {
      grid-column: 1 / -1;
      grid-row: 2;
      border: 2px solid #fff;
      background: #000;
    }

    #dialogue-box {
      padding: 1rem 1.25rem;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      background: #000;
      min-height: 90px;
      position: relative;
    }

    #dialogue-text {
      font-family: 'DotGothic16', monospace;
      font-size: 1rem;
      line-height: 1.7;
      color: #fff;
      letter-spacing: 0.03em;
      min-height: 2.8rem;
    }

    #advance-hint {
      font-family: 'DotGothic16', monospace;
      font-size: 0.8rem;
      color: #f5c542;
      text-align: right;
      position: absolute;
      right: 1rem;
      bottom: 0.5rem;
      opacity: 0;
      animation: hint-pulse 1s ease-in-out infinite;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    /* ── RESPONSIVO ────────────────────────────────────── */
    @media (max-width: 700px) {
      #vn-scene {
        padding: 0.5rem;
      }

      #vn-layout {
        grid-template-columns: minmax(0, 1fr) 130px;
        gap: 0.5rem;
        max-width: 100vw;
      }

      #name-box {
        font-size: 0.7rem;
        padding: 0.3rem 0.6rem;
        min-width: 90px;
      }

      #choice-container {
        padding: 0.6rem 0.7rem;
      }

      #choice-placeholder {
        padding: 0.6rem;
        min-height: 100px;
      }

      .choice-btn {
        font-size: 0.72rem;
        padding: 0.3rem 0 0.3rem 1.1rem;
      }

      .choice-btn::before,
      .choice-btn--active::before {
        font-size: 0.7rem;
      }

      #dialogue-box {
        padding: 0.7rem 0.9rem;
        min-height: 80px;
      }

      #dialogue-text {
        font-size: 0.82rem;
        line-height: 1.55;
      }

      #advance-hint {
        font-size: 0.7rem;
        right: 0.7rem;
        bottom: 0.4rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="site-title">Zfcmaru</a>
      <a href="../vn/">Ocean Park</a>
    </div>
  </nav>

  <div id="vn-stage" tabindex="-1">

    <!-- Tela inicial -->
    <div id="vn-start-screen">
      <h1 id="game-title">Ocean Park</h1>
      <p id="start-hint">press enter or click to start</p>
    </div>

    <!-- Mapa -->
    <div id="vn-map">
      <canvas id="wind-canvas"></canvas>
      <div id="player"></div>
      <div id="destination"></div>
      <div id="map-hint">← → helm · W S motor · reach the marker</div>
    </div>

    <!-- Cena VN -->
    <div id="vn-scene">

      <div id="vn-layout">

        <!-- Coluna esquerda: viewport com arte + namebox -->
        <div id="vn-frame-outer">
          <div id="center-viewport">
            <div id="vn-background"></div>
            <div id="vn-character">
              <img id="char-img" src="../art/Girl_neutral.png" alt="">
            </div>
            <div id="name-box"></div>
          </div>
        </div>

        <!-- Coluna direita: choices (só aparece quando há escolha) -->
        <div id="choice-container"></div>
        <div id="choice-placeholder"></div>

        <!-- Linha inferior: dialogue full width -->
        <div id="vn-bottom">
          <div id="dialogue-box">
            <div id="dialogue-text"></div>
            <div id="advance-hint">▼</div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script src="story.js"></script>

  <script>
    // ── ESTADO ────────────────────────────────────────────────────────────────
    let gameState      = 'start';
    let currentBeatId  = null;
    let isBlinking     = false;
    let isChoosing      = false;
    let choiceIndex     = 0;
    let currentChoiceId = null;
    let blinkTimer     = null;
    let vnTyping       = false;
    let vnTypeTimer    = null;

    const player = { x: 0, y: 0 };
    const dest   = { x: 0, y: 0 };
    const TRIGGER_DIST = 40;
    const keys = {};

    const wind = {
      angle: 0, targetAngle: 0, strength: 1.2,
      changeTimer: 0, changeInterval: 180
    };
    let boatAngle = 0;
    const ROTATION_SPEED = 0.045;
    const PARTICLE_COUNT = 55;
    const particles      = [];

    let motorState = 'neutral';
    let speed = 0;
    const ACCELERATION = 0.15;
    const MAX_SPEED    = 4.0;
    const DRAG         = 0.985;
    const WIND_FORCE   = 0.35;

    // ── ELEMENTOS ─────────────────────────────────────────────────────────────
    const els = {
      startScreen:       document.getElementById('vn-start-screen'),
      map:               document.getElementById('vn-map'),
      playerEl:          document.getElementById('player'),
      destEl:            document.getElementById('destination'),
      scene:             document.getElementById('vn-scene'),
      background:        document.getElementById('vn-background'),
      charImg:           document.getElementById('char-img'),
      nameBox:           document.getElementById('name-box'),
      dialogText:        document.getElementById('dialogue-text'),
      hint:              document.getElementById('advance-hint'),
      dialogueBox:       document.getElementById('dialogue-box'),
      choiceContainer:   document.getElementById('choice-container'),
      choicePlaceholder: document.getElementById('choice-placeholder'),
    };

    // ── AUDIO ─────────────────────────────────────────────────────────────────
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playTypeBeep() {
      try {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 310 + Math.random() * 50;
        osc.type = 'square';
        const t = ctx.currentTime;
        gain.gain.setValueAtTime(0.07, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        osc.start(t);
        osc.stop(t + 0.04);
      } catch (err) {}
    }

    // ── PRELOAD ───────────────────────────────────────────────────────────────
    (function preloadAssets() {
      Object.values(SPRITES).forEach(src => { const i = new Image(); i.src = src; });
      Object.values(SCRIPT).forEach(node => { if (node.bg) { const i = new Image(); i.src = node.bg; } });
    })();

    // ── SPRITES ───────────────────────────────────────────────────────────────
    function setSprite(name) {
      els.charImg.src = SPRITES[name];
    }

    // ── BLINK CYCLE ───────────────────────────────────────────────────────────
    function blinkCycle() {
      if (!isBlinking) return;
      setSprite('neutral');
      blinkTimer = setTimeout(() => {
        if (!isBlinking) return;
        setSprite('semi_rest');
        blinkTimer = setTimeout(() => {
          if (!isBlinking) return;
          setSprite('rest');
          blinkTimer = setTimeout(() => {
            if (!isBlinking) return;
            setSprite('semi_rest');
            blinkTimer = setTimeout(() => blinkCycle(), 60);
          }, 80);
        }, 80);
      }, 3200 + Math.random() * 1200);
    }

    function startBlinkCycle() {
      if (isBlinking) return;
      isBlinking = true;
      blinkCycle();
    }

    function stopBlinkCycle() {
      isBlinking = false;
      clearTimeout(blinkTimer);
    }

    // ── MAPA ──────────────────────────────────────────────────────────────────
    function applyPlayerPos() {
      els.playerEl.style.left = player.x + 'px';
      els.playerEl.style.top  = player.y + 'px';
    }

    function applyDestPos() {
      els.destEl.style.left = dest.x + 'px';
      els.destEl.style.top  = dest.y + 'px';
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    let rafId = null;

    // ── VENTO ─────────────────────────────────────────────────────────────────
    function updateWind() {
      wind.changeTimer++;
      if (wind.changeTimer >= wind.changeInterval) {
        wind.changeTimer = 0;
        const delta = (Math.random() - 0.5) * (Math.PI * 2 / 3);
        wind.targetAngle = wind.angle + delta;
        wind.changeInterval = 150 + Math.floor(Math.random() * 120);
      }
      wind.angle += (wind.targetAngle - wind.angle) * 0.012;
    }

    function getWindVector() {
      return {
        x: Math.cos(wind.angle) * wind.strength,
        y: Math.sin(wind.angle) * wind.strength
      };
    }

    // ── PARTÍCULAS ────────────────────────────────────────────────────────────
    function initParticles() {
      particles.length = 0;
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x:       Math.random() * W,
          y:       Math.random() * H,
          size:    1.5 + Math.random() * 2,
          speed:   0.8 + Math.random() * 1.4,
          opacity: 0.2 + Math.random() * 0.5
        });
      }
    }

    function updateParticles() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      const wv = getWindVector();
      for (const p of particles) {
        p.x += wv.x * p.speed;
        p.y += wv.y * p.speed;
        if (p.x < -10)    p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        if (p.y < -10)    p.y = H + 10;
        if (p.y > H + 10) p.y = -10;
      }
    }

    function drawWindParticles(ctx) {
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
        ctx.fill();
      }
    }

    function drawAll() {
      const canvas = document.getElementById('wind-canvas');
      const ctx    = canvas.getContext('2d');
      const stage  = document.getElementById('vn-stage');
      if (canvas.width !== stage.clientWidth) {
        canvas.width  = stage.clientWidth;
        canvas.height = stage.clientHeight;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawWindParticles(ctx);
      drawHUD(ctx, canvas.width, canvas.height);
    }

    function drawGameOver() {
      const canvas = document.getElementById('wind-canvas');
      const ctx    = canvas.getContext('2d');
      const stage  = document.getElementById('vn-stage');
      canvas.width  = stage.clientWidth;
      canvas.height = stage.clientHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '18px "DotGothic16", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('[ game over ]', canvas.width / 2, canvas.height / 2);
      ctx.font = '11px "DotGothic16", monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('press enter to continue', canvas.width / 2, canvas.height / 2 + 32);
      ctx.textAlign = 'left';
    }

    function drawHUD(ctx, W, H) {
      if (gameState !== 'walking') return;
      const motorColors = { forward: '#f5c542', neutral: '#fff', reverse: '#fb923c' };
      const col = motorColors[motorState];

      ctx.font = '11px "DotGothic16", monospace';
      ctx.fillStyle = col;
      ctx.textAlign = 'left';
      ctx.fillText('[ MOTOR: ' + motorState.toUpperCase() + ' ]', 16, H - 48);

      const segments = 5;
      const filled = Math.round((Math.abs(speed) / MAX_SPEED) * segments);
      for (let i = 0; i < segments; i++) {
        ctx.fillStyle = i < filled ? col : 'rgba(255,255,255,0.2)';
        ctx.fillRect(16 + i * 16, H - 68, 12, 4);
      }
    }

    // ── MOVIMENTO DO BARCO ────────────────────────────────────────────────────
    function tickPhysics(state, input) {
      const next = Object.assign({}, state);

      if (input.left)  next.heading -= ROTATION_SPEED;
      if (input.right) next.heading += ROTATION_SPEED;

      if (input.forward)      next.motorState = 'forward';
      else if (input.reverse) next.motorState = 'reverse';
      else                    next.motorState = 'neutral';

      if (next.motorState === 'forward')
        next.speed = Math.min(next.speed + ACCELERATION, MAX_SPEED);
      else if (next.motorState === 'reverse')
        next.speed = Math.max(next.speed - ACCELERATION, -MAX_SPEED * 0.4);
      else
        next.speed = next.speed * DRAG;

      const windX = Math.cos(next.windAngle) * WIND_FORCE;
      const windY = Math.sin(next.windAngle) * WIND_FORCE;

      const perpX = -Math.sin(next.heading);
      const perpY =  Math.cos(next.heading);
      const windDot = Math.cos(next.windAngle) * perpX + Math.sin(next.windAngle) * perpY;
      const DRIFT_FORCE = 0.12;
      const driftX = perpX * windDot * DRIFT_FORCE;
      const driftY = perpY * windDot * DRIFT_FORCE;

      next.x = state.x + Math.cos(next.heading) * next.speed + windX + driftX;
      next.y = state.y + Math.sin(next.heading) * next.speed + windY + driftY;

      return next;
    }

    function updatePlayer() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;

      const input = {
        left:    !!(keys['ArrowLeft']  || keys['KeyA']),
        right:   !!(keys['ArrowRight'] || keys['KeyD']),
        forward: !!(keys['KeyW'] || keys['ArrowUp']),
        reverse: !!(keys['KeyS'] || keys['ArrowDown'])
      };

      const state = {
        x: player.x, y: player.y,
        heading: boatAngle, speed: speed,
        motorState: motorState,
        windAngle: wind.angle
      };

      const next = tickPhysics(state, input);

      if (next.x < 0 || next.x > W || next.y < 0 || next.y > H) {
        gameState = 'game_over';
        els.map.style.display = 'none';
        return;
      }

      player.x   = next.x;
      player.y   = next.y;
      boatAngle  = next.heading;
      speed      = next.speed;
      motorState = next.motorState;

      const degrees = boatAngle * (180 / Math.PI);
      els.playerEl.style.left      = player.x + 'px';
      els.playerEl.style.top       = player.y + 'px';
      els.playerEl.style.transform = `translate(-50%, -50%) rotate(${degrees + 90}deg)`;
    }

    function gameLoop() {
      if (gameState === 'game_over') {
        drawGameOver();
        return;
      }
      if (gameState !== 'walking') return;
      updateWind();
      updateParticles();
      updatePlayer();
      if (gameState === 'game_over') {
        drawGameOver();
        return;
      }
      drawAll();
      if (dist(player, dest) <= TRIGGER_DIST) {
        startDialogue();
        return;
      }
      rafId = requestAnimationFrame(gameLoop);
    }

    // ── TRANSIÇÕES DE ESTADO ──────────────────────────────────────────────────
    function resetGame() {
      const stage = document.getElementById('vn-stage');
      const W = stage.clientWidth;
      const H = stage.clientHeight;
      player.x = W * 0.15;
      player.y = H * 0.50;
      dest.x   = W * 0.75;
      dest.y   = H * 0.50;
      applyPlayerPos();
      applyDestPos();
      boatAngle  = Math.atan2(dest.y - player.y, dest.x - player.x);
      speed      = 0;
      motorState = 'neutral';
      wind.angle       = Math.PI / 4;
      wind.targetAngle = Math.PI / 4;
      wind.changeTimer = 0;
      initParticles();
    }

    function startGame() {
      els.startScreen.style.display = 'none';
      els.map.style.display = 'block';
      resetGame();
      gameState = 'walking';
      const stage = document.getElementById('vn-stage');
      stage.focus({ preventScroll: true });
      getAudioCtx();
      rafId = requestAnimationFrame(gameLoop);
    }

    function startDialogue() {
      gameState = 'dialogue';
      cancelAnimationFrame(rafId);
      els.map.style.display = 'none';
      els.scene.style.display = 'flex';
      void els.scene.offsetWidth;
      els.scene.style.opacity = '1';
      startBlinkCycle();
      showBeat('s01');
    }

    function endVN() {
      stopBlinkCycle();
      els.scene.style.display = 'none';
      els.scene.style.opacity = '0';
      resetGame();
      els.startScreen.style.display = 'flex';
      gameState = 'start';
    }

    // ── MOTOR VN ──────────────────────────────────────────────────────────────
    function showBeat(id) {
      if (id === 'END') { endVN(); return; }

      if (CHOICES[id]) {
        showChoice(id);
        return;
      }

      const beat = SCRIPT[id];
      currentBeatId = id;

      if (beat.bg) {
        els.background.style.backgroundImage = `url(${beat.bg})`;
      }

      if (beat.sprite) {
        if (beat.sprite === 'angry') {
          stopBlinkCycle();
          setSprite('angry');
        } else {
          if (!isBlinking) startBlinkCycle();
        }
      }

      if (beat.speaker && CHARACTERS[beat.speaker]) {
        const char = CHARACTERS[beat.speaker];
        els.nameBox.textContent = char.name;
        els.nameBox.style.color = char.color || '#fff';
        els.nameBox.style.display = 'block';
      } else if (beat.speaker === "") {
        els.nameBox.textContent = '';
        els.nameBox.style.display = 'none';
      }

      els.hint.style.animationPlayState = 'paused';
      els.hint.style.opacity = '0';
      startTypewriter(beat.text);
    }

    function startTypewriter(text) {
      vnTyping = true;
      els.dialogText.textContent = '';
      let i = 0;
      clearInterval(vnTypeTimer);
      vnTypeTimer = setInterval(() => {
        const char = text[i];
        els.dialogText.textContent += char;
        if (char && char.trim() !== '') {
          playTypeBeep();
        }
        i++;
        if (i >= text.length) {
          clearInterval(vnTypeTimer);
          vnTyping = false;
          els.hint.style.animationPlayState = 'running';
          els.hint.style.opacity = '1';
        }
      }, 28);
    }

    function advance() {
      if (gameState !== 'dialogue') return;
      if (isChoosing) return;

      if (vnTyping) {
        clearInterval(vnTypeTimer);
        vnTyping = false;
        els.dialogText.textContent = SCRIPT[currentBeatId].text;
        els.hint.style.animationPlayState = 'running';
        els.hint.style.opacity = '1';
        return;
      }

      showBeat(SCRIPT[currentBeatId].next);
    }

    // ── CHOICE UI ─────────────────────────────────────────────────────────────
    function showChoice(choiceId) {
      currentChoiceId = choiceId;
      isChoosing = true;
      choiceIndex = 0;
      const choice = CHOICES[choiceId];

      els.choiceContainer.innerHTML = '';
      choice.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;
        btn.dataset.index = i;
        btn.addEventListener('click', () => confirmChoice(choice, i));
        btn.addEventListener('touchstart', e => {
          e.preventDefault();
          confirmChoice(choice, i);
        }, { passive: false });
        btn.addEventListener('mouseenter', () => {
          choiceIndex = i;
          updateChoiceHighlight();
        });
        els.choiceContainer.appendChild(btn);
      });

      updateChoiceHighlight();

      els.nameBox.textContent = '';
      els.nameBox.style.display = 'none';
      els.dialogText.textContent = '';
      els.hint.style.opacity = '0';

      els.choiceContainer.classList.add('is-active');
      els.choicePlaceholder.style.display = 'none';
    }

    function updateChoiceHighlight() {
      const btns = els.choiceContainer.querySelectorAll('.choice-btn');
      btns.forEach((btn, i) => {
        btn.classList.toggle('choice-btn--active', i === choiceIndex);
      });
    }

    function confirmChoice(choice, index) {
      els.choiceContainer.classList.remove('is-active');
      els.choiceContainer.innerHTML = '';
      els.choicePlaceholder.style.display = '';
      isChoosing = false;
      showBeat(choice.options[index].next);
    }

    // ── EVENTOS ───────────────────────────────────────────────────────────────
    els.startScreen.addEventListener('click', startGame);
    els.startScreen.addEventListener('touchstart', function(e) {
      e.preventDefault();
      startGame();
    }, { passive: false });

    els.dialogueBox.addEventListener('click', advance);
    els.dialogueBox.addEventListener('touchstart', function(e) {
      e.preventDefault();
      advance();
    }, { passive: false });

    function handleKeyDown(e) {
      keys[e.code] = true;

      if (gameState === 'start') {
        if (['Space', 'Enter'].includes(e.code)) {
          e.preventDefault();
          startGame();
        }
        return;
      }

      if (gameState === 'game_over') {
        if (['Enter', 'Space'].includes(e.code)) {
          e.preventDefault();
          resetGame();
          els.map.style.display = 'none';
          els.startScreen.style.display = 'flex';
          gameState = 'start';
        }
        return;
      }

      if (gameState === 'walking') {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
             'KeyW','KeyS','KeyA','KeyD'].includes(e.code)) {
          e.preventDefault();
        }
        return;
      }

      if (gameState === 'dialogue' && isChoosing) {
        const choice = CHOICES[currentChoiceId];
        if (e.code === 'ArrowUp') {
          e.preventDefault();
          choiceIndex = (choiceIndex - 1 + choice.options.length) % choice.options.length;
          updateChoiceHighlight();
        }
        if (e.code === 'ArrowDown') {
          e.preventDefault();
          choiceIndex = (choiceIndex + 1) % choice.options.length;
          updateChoiceHighlight();
        }
        if (['Enter', 'Space'].includes(e.code)) {
          e.preventDefault();
          confirmChoice(choice, choiceIndex);
        }
        return;
      }

      if (gameState === 'dialogue') {
        if (['Space', 'Enter', 'ArrowRight'].includes(e.code)) {
          e.preventDefault();
          advance();
        }
      }
    }

    function handleKeyUp(e) {
      keys[e.code] = false;
    }

    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup',   handleKeyUp);
  </script>

</body>
</html>

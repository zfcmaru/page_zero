<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Park</title>
  <link rel="stylesheet" href="assets/css/vn.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; }
  </style>
</head>
<body>

  <a id="vn-back" href="/" title="back to hub">← back</a>

  <div id="vn-stage" tabindex="-1">

    <!-- Tela inicial -->
    <div id="vn-start-screen">
      <h1 id="game-title">Ocean Park</h1>
      <p id="start-hint">press enter or click to start</p>
    </div>

    <!-- Seleção de cena -->
    <div id="scene-select-panel"></div>

    <!-- Cena VN -->
    <div id="vn-scene">

      <div id="vn-layout">

        <!-- Coluna esquerda: viewport com arte + namebox -->
        <div id="vn-frame-outer">
          <div id="center-viewport">
            <div id="vn-background"></div>
            <div id="vn-character">
              <img id="char-img" src="../art/Girl_neutral.png" alt="">
            </div>
            <div id="name-box"></div>
          </div>
        </div>

        <!-- Coluna direita: choices OU minigame -->
        <div id="choice-container"></div>
        <div id="minigame-panel">
          <canvas id="minigame-canvas"></canvas>
          <div id="minigame-hint">← → helm · W S motor · Q abort</div>
        </div>
        <div id="choice-placeholder"></div>

        <!-- Linha inferior: dialogue full width -->
        <div id="vn-bottom">
          <div id="dialogue-box">
            <div id="dialogue-text"></div>
            <div id="advance-hint">▼</div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- Data layer -->
  <script src="story.js"></script>
  <script src="scenarios.js"></script>
  <!-- Utilities -->
  <script src="js/physics.js"></script>
  <script src="js/audio.js"></script>
  <!-- Game modules -->
  <script src="js/vn.js"></script>
  <script src="js/choices.js"></script>
  <script src="js/minigame.js"></script>
  <script src="js/scene-select.js"></script>
  <!-- State + bootstrap -->
  <script src="js/state.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
